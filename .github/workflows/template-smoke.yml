name: template-smoke

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  template-smoke:
    name: template-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate script syntax
        run: bash -n scripts/*.sh

      - name: Run auto-init smoke test
        run: ./scripts/smoke-auto-init.sh
