name: security-nightly

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-nightly:
    name: trivy-nightly
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Resolve SARIF upload mode
        id: mode
        run: |
          mode="${{ vars.SARIF_UPLOAD_MODE }}"
          if [ -z "$mode" ]; then
            mode="auto"
          fi

          ./scripts/resolve-security-feature-mode.sh \
            --feature sarif-upload \
            --mode "$mode" \
            --repo "${{ github.repository }}" \
            --private-repo "${{ github.event.repository.private }}" \
            --owner-type "${{ github.event.repository.owner.type }}" \
            --token "${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_OUTPUT"

      - name: Run Trivy SARIF
        if: steps.mode.outputs.run_feature == 'true'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: v0.69.3
          token-setup-trivy: ${{ secrets.GITHUB_TOKEN }}
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          severity: MEDIUM,HIGH,CRITICAL
          scanners: vuln,misconfig,secret

      - name: Run Trivy (fallback mode without SARIF upload)
        if: steps.mode.outputs.run_feature != 'true'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: v0.69.3
          token-setup-trivy: ${{ secrets.GITHUB_TOKEN }}
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          severity: MEDIUM,HIGH,CRITICAL
          scanners: vuln,misconfig,secret

      - name: Upload SARIF
        if: steps.mode.outputs.run_feature == 'true'
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      - name: SARIF upload skipped
        if: steps.mode.outputs.run_feature != 'true'
        run: |
          echo "SARIF upload skipped. Trivy fallback scan completed."
          echo "mode=${{ steps.mode.outputs.mode }}"
          echo "reason=${{ steps.mode.outputs.reason }}"
          echo "capability_status=${{ steps.mode.outputs.capability_status }}"
          echo "capability_detail=${{ steps.mode.outputs.capability_detail }}"
