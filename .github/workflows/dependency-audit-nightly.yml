name: dependency-audit-nightly

on:
  push:
    branches:
      - main
  schedule:
    - cron: "43 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Detect dependency manifests
        id: detect
        run: |
          node=false
          python=false
          java=false

          if [ -f package.json ]; then
            node=true
          fi
          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            python=true
          fi
          if [ -f pom.xml ]; then
            java=true
          fi

          echo "node=$node" >> "$GITHUB_OUTPUT"
          echo "python=$python" >> "$GITHUB_OUTPUT"
          echo "java=$java" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"

      - name: Run npm audit
        if: steps.detect.outputs.node == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm audit --audit-level=high
          else
            npm install --package-lock-only --ignore-scripts
            npm audit --audit-level=high
          fi

      - name: Setup Python
        if: steps.detect.outputs.python == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Run pip-audit
        if: steps.detect.outputs.python == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          elif [ -f pyproject.toml ]; then
            python -m pip install .
            pip-audit
          fi

      - name: Setup Java
        if: steps.detect.outputs.java == 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven dependency-check
        if: steps.detect.outputs.java == 'true'
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          MVN="mvn"
          if [ -x ./mvnw ]; then
            MVN="./mvnw"
          fi

          EXTRA_ARGS=()
          if [ -n "${NVD_API_KEY:-}" ]; then
            EXTRA_ARGS+=("-Dnvd.api.key=$NVD_API_KEY")
          fi

          "$MVN" -B -DskipTests org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 "${EXTRA_ARGS[@]}"

      - name: No supported manifests detected
        if: steps.detect.outputs.node != 'true' && steps.detect.outputs.python != 'true' && steps.detect.outputs.java != 'true'
        run: echo "No Node/Python/Java dependency manifests detected; dependency audit skipped."
