name: dependency-audit-nightly

on:
  push:
    branches:
      - main
  schedule:
    - cron: "43 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Detect dependency manifests
        id: detect
        run: |
          node_dirs="$(
            find . -type f -name package.json -not -path '*/node_modules/*' -not -path './profiles/*' -not -path './.claude/*' -print \
              | sed 's#^\./##' \
              | while IFS= read -r file; do dirname "$file"; done \
              | sort -u
          )"

          python_requirements_files="$(
            find . -type f -name 'requirements*.txt' -not -path '*/.venv/*' -not -path '*/venv/*' -not -path './profiles/*' -not -path './.claude/*' -print \
              | sed 's#^\./##' \
              | sort -u
          )"

          python_pyproject_dirs="$(
            find . -type f -name pyproject.toml -not -path '*/.venv/*' -not -path '*/venv/*' -not -path './profiles/*' -not -path './.claude/*' -print \
              | sed 's#^\./##' \
              | while IFS= read -r file; do dirname "$file"; done \
              | sort -u
          )"

          java_dirs="$(
            find . -type f -name pom.xml -not -path '*/target/*' -not -path './profiles/*' -not -path './.claude/*' -print \
              | sed 's#^\./##' \
              | while IFS= read -r file; do dirname "$file"; done \
              | sort -u
          )"

          go_dirs="$(
            find . -type f -name go.mod -not -path '*/vendor/*' -not -path './profiles/*' -not -path './.claude/*' -print \
              | sed 's#^\./##' \
              | while IFS= read -r file; do dirname "$file"; done \
              | sort -u
          )"

          rust_dirs="$(
            find . -type f -name Cargo.toml -not -path '*/target/*' -not -path './profiles/*' -not -path './.claude/*' -print \
              | sed 's#^\./##' \
              | while IFS= read -r file; do dirname "$file"; done \
              | sort -u
          )"

          node=false
          python=false
          java=false
          go=false
          rust=false

          if [ -n "$node_dirs" ]; then
            node=true
          fi
          if [ -n "$python_requirements_files" ] || [ -n "$python_pyproject_dirs" ]; then
            python=true
          fi
          if [ -n "$java_dirs" ]; then
            java=true
          fi
          if [ -n "$go_dirs" ]; then
            go=true
          fi
          if [ -n "$rust_dirs" ]; then
            rust=true
          fi

          echo "node=$node" >> "$GITHUB_OUTPUT"
          echo "python=$python" >> "$GITHUB_OUTPUT"
          echo "java=$java" >> "$GITHUB_OUTPUT"
          echo "go=$go" >> "$GITHUB_OUTPUT"
          echo "rust=$rust" >> "$GITHUB_OUTPUT"

          echo "node_dirs<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$node_dirs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "python_requirements_files<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$python_requirements_files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "python_pyproject_dirs<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$python_pyproject_dirs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "java_dirs<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$java_dirs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "go_dirs<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$go_dirs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "rust_dirs<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$rust_dirs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "22"

      - name: Run npm audit
        if: steps.detect.outputs.node == 'true'
        run: |
          while IFS= read -r node_dir; do
            [ -z "$node_dir" ] && continue
            echo "::group::npm audit ($node_dir)"
            pushd "$node_dir" >/dev/null
            if [ -f package-lock.json ]; then
              npm audit --audit-level=high
            else
              npm install --package-lock-only --ignore-scripts
              npm audit --audit-level=high
            fi
            popd >/dev/null
            echo "::endgroup::"
          done <<< "${{ steps.detect.outputs.node_dirs }}"

      - name: Setup Python
        if: steps.detect.outputs.python == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Run pip-audit
        if: steps.detect.outputs.python == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

          while IFS= read -r requirements_file; do
            [ -z "$requirements_file" ] && continue
            requirements_dir="$(dirname "$requirements_file")"
            requirements_base="$(basename "$requirements_file")"
            echo "::group::pip-audit requirements ($requirements_file)"
            pushd "$requirements_dir" >/dev/null
            pip-audit -r "$requirements_base"
            popd >/dev/null
            echo "::endgroup::"
          done <<< "${{ steps.detect.outputs.python_requirements_files }}"

          while IFS= read -r pyproject_dir; do
            [ -z "$pyproject_dir" ] && continue
            if compgen -G "$pyproject_dir/requirements*.txt" >/dev/null; then
              continue
            fi
            echo "::group::pip-audit pyproject ($pyproject_dir)"
            pushd "$pyproject_dir" >/dev/null
            python -m pip install .
            pip-audit
            popd >/dev/null
            echo "::endgroup::"
          done <<< "${{ steps.detect.outputs.python_pyproject_dirs }}"

      - name: Setup Java
        if: steps.detect.outputs.java == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven dependency-check
        if: steps.detect.outputs.java == 'true'
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          EXTRA_ARGS=()
          if [ -n "${NVD_API_KEY:-}" ]; then
            EXTRA_ARGS+=("-Dnvd.api.key=$NVD_API_KEY")
          fi

          while IFS= read -r java_dir; do
            [ -z "$java_dir" ] && continue
            echo "::group::maven dependency-check ($java_dir)"
            pushd "$java_dir" >/dev/null
            MVN="mvn"
            if [ -x ./mvnw ]; then
              MVN="./mvnw"
            fi
            "$MVN" -B -DskipTests org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 "${EXTRA_ARGS[@]}"
            popd >/dev/null
            echo "::endgroup::"
          done <<< "${{ steps.detect.outputs.java_dirs }}"

      - name: Run govulncheck
        if: steps.detect.outputs.go == 'true'
        run: |
          if ! command -v go >/dev/null 2>&1; then
            echo "Go toolchain not found on runner."
            exit 1
          fi
          if ! command -v govulncheck >/dev/null 2>&1; then
            go install golang.org/x/vuln/cmd/govulncheck@latest
            echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          fi

          while IFS= read -r go_dir; do
            [ -z "$go_dir" ] && continue
            echo "::group::govulncheck ($go_dir)"
            pushd "$go_dir" >/dev/null
            govulncheck ./...
            popd >/dev/null
            echo "::endgroup::"
          done <<< "${{ steps.detect.outputs.go_dirs }}"

      - name: Run cargo audit
        if: steps.detect.outputs.rust == 'true'
        run: |
          if ! command -v cargo >/dev/null 2>&1; then
            echo "Rust toolchain not found on runner."
            exit 1
          fi
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --locked
          fi

          while IFS= read -r rust_dir; do
            [ -z "$rust_dir" ] && continue
            echo "::group::cargo audit ($rust_dir)"
            pushd "$rust_dir" >/dev/null
            cargo audit
            popd >/dev/null
            echo "::endgroup::"
          done <<< "${{ steps.detect.outputs.rust_dirs }}"

      - name: No supported manifests detected
        if: steps.detect.outputs.node != 'true' && steps.detect.outputs.python != 'true' && steps.detect.outputs.java != 'true' && steps.detect.outputs.go != 'true' && steps.detect.outputs.rust != 'true'
        run: echo "No Node/Python/Java/Go/Rust dependency manifests detected; dependency audit skipped."
