name: security-pr

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Resolve dependency-review mode
        id: mode
        run: |
          mode="${{ vars.DEPENDENCY_REVIEW_MODE }}"
          if [ -z "$mode" ]; then
            mode="auto"
          fi
          ./scripts/resolve-security-feature-mode.sh \
            --feature dependency-review \
            --mode "$mode" \
            --repo "${{ github.repository }}" \
            --private-repo "${{ github.event.repository.private }}" \
            --owner-type "${{ github.event.repository.owner.type }}" \
            --token "${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_OUTPUT"

      - name: Dependency Review
        if: steps.mode.outputs.run_feature == 'true'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          config-file: .github/dependency-review-config.yml
          fail-on-severity: high
          comment-summary-in-pr: always

      - name: Dependency Review skipped
        if: steps.mode.outputs.run_feature != 'true'
        run: |
          echo "Dependency Review skipped."
          echo "mode=${{ steps.mode.outputs.mode }}"
          echo "reason=${{ steps.mode.outputs.reason }}"
          echo "capability_status=${{ steps.mode.outputs.capability_status }}"
          echo "capability_detail=${{ steps.mode.outputs.capability_detail }}"

  trivy-pr:
    name: trivy-pr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: v0.69.3
          token-setup-trivy: ${{ secrets.GITHUB_TOKEN }}
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          scanners: vuln,misconfig
