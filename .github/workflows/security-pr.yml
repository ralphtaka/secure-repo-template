name: security-pr

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    steps:
      - name: Resolve dependency-review mode
        id: mode
        run: |
          mode="${{ vars.DEPENDENCY_REVIEW_MODE }}"
          if [ -z "$mode" ]; then
            mode="auto"
          fi

          private_repo="${{ github.event.repository.private }}"
          owner_type="${{ github.event.repository.owner.type }}"
          run_review="true"
          reason="enabled"

          case "$mode" in
            off)
              run_review="false"
              reason="disabled by DEPENDENCY_REVIEW_MODE=off"
              ;;
            auto)
              if [ "$private_repo" = "true" ] && [ "$owner_type" = "User" ]; then
                run_review="false"
                reason="auto-skip for private personal repository"
              fi
              ;;
            enforce)
              ;;
            *)
              echo "Invalid DEPENDENCY_REVIEW_MODE='$mode' (expected auto|off|enforce)." >&2
              exit 1
              ;;
          esac

          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "run_review=$run_review" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.mode.outputs.run_review == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Dependency Review
        if: steps.mode.outputs.run_review == 'true'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          config-file: .github/dependency-review-config.yml
          fail-on-severity: high
          comment-summary-in-pr: always

      - name: Dependency Review skipped
        if: steps.mode.outputs.run_review != 'true'
        run: |
          echo "Dependency Review skipped."
          echo "mode=${{ steps.mode.outputs.mode }}"
          echo "reason=${{ steps.mode.outputs.reason }}"

  trivy-pr:
    name: trivy-pr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: v0.69.3
          token-setup-trivy: ${{ secrets.GITHUB_TOKEN }}
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          scanners: vuln,misconfig
